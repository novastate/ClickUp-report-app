{% if breadcrumbs %}
<nav class="breadcrumbs" aria-label="breadcrumb">
  {% for crumb in breadcrumbs %}
    {% if not loop.last %}
      <a href="{{ crumb.href }}">{{ crumb.label }}</a>
      <span class="separator" aria-hidden="true">›</span>
    {% else %}
      <span class="current" aria-current="page">{{ crumb.label }}</span>
    {% endif %}
  {% endfor %}
</nav>
{% endif %}
