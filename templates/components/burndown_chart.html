<div class="panel">
  <h3>Burndown Chart</h3>
  <div class="chart-container">
    <canvas id="burndownChart"></canvas>
  </div>
  {% if sprint.closed_at and progress_history and progress_history|length < team.sprint_length_days %}
    <div class="chart-caption" style="font-size:12px; color:#718096; margin-top:8px;">
      Last snapshot: Day {{ progress_history|length - 1 }}. No data captured for the remaining days.
    </div>
  {% endif %}
</div>
<script>
(function() {
  const progressData = {{ progress_history|tojson }};
  const forecasted = {{ summary.forecasted|default(0) }};
  const sprintDays = {{ team.sprint_length_days }};
  const idealLabels = [];
  const idealData = [];
  for (let i = 0; i <= sprintDays; i++) {
    idealLabels.push('Day ' + i);
    idealData.push(Math.round(forecasted - (forecasted / sprintDays) * i));
  }
  const actualData = progressData.map(p => forecasted - p.completed_tasks);
  new Chart(document.getElementById('burndownChart'), {
    type: 'line',
    data: {
      labels: idealLabels,
      datasets: [
        { label: 'Ideal', data: idealData, borderColor: '#d9d9d9', borderDash: [6, 4], borderWidth: 2, pointRadius: 0, fill: false },
        { label: 'Actual', data: actualData, borderColor: '#7b68ee', borderWidth: 3, pointRadius: 3, fill: false }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { position: 'bottom' } } }
  });
})();
</script>
