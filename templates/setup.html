{% extends "base.html" %}
{% block title %}Setup — Sprint Reporter{% endblock %}
{% block content %}
<div class="content-narrow" style="padding-top: 80px;">
  <div class="panel" style="text-align:center; padding:40px 32px;">
    <h2 style="margin-bottom: 4px;">Connect to ClickUp</h2>
    <p style="color: #718096; margin-bottom: 28px;">Enter your API key to get started.</p>

    <form method="POST" action="/setup" style="text-align:left;">
      <div class="form-group">
        <label>API Key</label>
        <input type="password" name="api_key" placeholder="pk_..." required
               style="font-family: monospace;">
        <p style="font-size: 12px; color: #a0aec0; margin-top: 4px;">
          Find it in <strong>ClickUp &rarr; Settings &rarr; Apps &rarr; API Token</strong>.
          Stored locally, never leaves your machine.
        </p>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
        Save & Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
