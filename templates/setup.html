{% extends "base.html" %}
{% block title %}Setup — Sprint Reporter{% endblock %}
{% block content %}
<div class="content" style="padding-top: 48px;">
  <div class="panel" style="max-width: 500px;">
    <h2 style="margin-bottom: 8px;">Connect to ClickUp</h2>
    <p style="color: #718096; margin-bottom: 24px;">
      Enter your ClickUp API key to get started.
    </p>

    <form method="POST" action="/setup">
      <div class="form-group">
        <label>API Key</label>
        <input type="password" name="api_key" placeholder="pk_..." required
               style="font-family: monospace;">
        <p style="font-size: 12px; color: #a0aec0; margin-top: 4px;">
          Find it in <strong>ClickUp → Settings → Apps → API Token</strong>.
          Your key is stored locally and never leaves your machine.
        </p>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">
        Save & Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
